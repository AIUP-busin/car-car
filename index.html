<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ottimo Catering | Inventar & Foto-Hisobot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F8FAFC; }
        .chart-container { position: relative; width: 100%; max-width: 600px; margin: auto; height: 300px; }
        .img-preview { width: 48px; height: 48px; object-fit: cover; border-radius: 8px; cursor: pointer; transition: transform 0.2s; }
        .img-preview:hover { transform: scale(1.1); }
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); }
        .modal-content { margin: auto; display: block; max-width: 80%; max-height: 80%; margin-top: 5%; border-radius: 12px; }
    </style>
</head>
<body class="text-slate-900">

    <!-- 
      PALETTE: Vibrant Forest (Emerald & Amber)
      PLAN: 
      1. Add Image column to the interactive inventory table.
      2. Implement a simple image modal for viewing photos.
      3. Maintain Chart.js analytics.
      CONFIRMATION: NO SVG, NO MERMAID.
    -->

    <div id="imageModal" class="modal flex items-center justify-center" onclick="this.style.display='none'">
        <img class="modal-content" id="fullImage">
    </div>

    <header class="bg-[#0F172A] text-white py-8 px-6 border-b border-white/10">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl font-bold tracking-tight">OTTIMO <span class="text-[#059669]">GALLERY</span></h1>
                <p class="text-slate-400 text-xs mt-1 uppercase tracking-widest">Vizual Inventar Nazorati</p>
            </div>
            <div class="bg-white/10 px-4 py-2 rounded-full text-xs font-medium">
                Sana: 12.06.2026
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-10">
        
        <!-- Summary Charts -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-12">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h3 class="text-sm font-bold text-slate-400 uppercase mb-4">Filiallararo Taqqoslash</h3>
                <div class="chart-container">
                    <canvas id="compChart"></canvas>
                </div>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h3 class="text-sm font-bold text-slate-400 uppercase mb-4">Parus Filiali Tarkibi</h3>
                <div class="chart-container">
                    <canvas id="parusChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Table with Images -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="p-6 border-b border-slate-100 flex flex-col md:flex-row justify-between items-center gap-4">
                <h2 class="text-xl font-bold">Buyumlar va Rasmlar</h2>
                <input type="text" id="search" placeholder="Buyum qidirish..." class="px-4 py-2 border rounded-lg focus:ring-2 focus:ring-[#059669] outline-none text-sm w-full md:w-64">
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="bg-slate-50 text-xs font-bold text-slate-400 uppercase tracking-widest">
                            <th class="px-6 py-4">Rasm</th>
                            <th class="px-6 py-4">Buyum nomi</th>
                            <th class="px-6 py-4 text-center">Parus</th>
                            <th class="px-6 py-4 text-center">Nukus</th>
                            <th class="px-6 py-4">Holat</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-slate-100">
                        <!-- JS populated -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // Rasm qo'shish uchun: rasm nomini "photo" qatoriga yozing.
        // Rasmlar .html fayl bilan bitta joyda yoki "rasmlar/" papkasida bo'lishi kerak.
        const inventory = [
            { name: "Pichoq", parus: 10, nukus: 18, photo: "pichoq.jpg" },
            { name: "Katta vilka", parus: 15, nukus: 20, photo: "vilka_katta.jpg" },
            { name: "Kichik vilka", parus: 3, nukus: 1, photo: "vilka_kichik.jpg" },
            { name: "Kichik qoshiq", parus: 6, nukus: 8, photo: "qoshiq.jpg" },
            { name: "Kapuchino chashka", parus: 10, nukus: 13, photo: "chashka.jpg" },
            { name: "Latte stakan", parus: 5, nukus: 0, photo: "stakan.jpg" }
        ];

        function render(data) {
            const body = document.getElementById('tableBody');
            body.innerHTML = data.map(item => `
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="px-6 py-4">
                        <img src="${item.photo}" 
                             alt="${item.name}" 
                             class="img-preview bg-slate-100" 
                             onerror="this.src='https://via.placeholder.com/150?text=Yoq'"
                             onclick="showFull('${item.photo}')">
                    </td>
                    <td class="px-6 py-4 font-semibold text-slate-700">${item.name}</td>
                    <td class="px-6 py-4 text-center text-[#059669] font-bold">${item.parus}</td>
                    <td class="px-6 py-4 text-center text-[#D97706] font-bold">${item.nukus}</td>
                    <td class="px-6 py-4 text-xs font-medium ${item.parus > item.nukus ? 'text-emerald-500' : 'text-amber-500'}">
                        ${item.parus > item.nukus ? 'Parusda ko\'p' : 'Nukusda ko\'p'}
                    </td>
                </tr>
            `).join('');
        }

        function showFull(src) {
            const modal = document.getElementById('imageModal');
            const fullImg = document.getElementById('fullImage');
            fullImg.src = src;
            modal.style.display = "flex";
        }

        function initCharts() {
            const commonOptions = {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    tooltip: {
                        callbacks: {
                            title: function(items) {
                                let label = items[0].chart.data.labels[items[0].dataIndex];
                                return Array.isArray(label) ? label.join(' ') : label;
                            }
                        }
                    }
                }
            };

            // Bar Chart
            new Chart(document.getElementById('compChart'), {
                type: 'bar',
                data: {
                    labels: ['Pichoq', 'Vilkalar', 'Chashka', 'Stakanlar'],
                    datasets: [
                        { label: 'Parus', data: [10, 18, 10, 5], backgroundColor: '#059669', borderRadius: 5 },
                        { label: 'Nukus', data: [18, 21, 13, 0], backgroundColor: '#D97706', borderRadius: 5 }
                    ]
                },
                options: commonOptions
            });

            // Donut Chart
            new Chart(document.getElementById('parusChart'), {
                type: 'doughnut',
                data: {
                    labels: ['Idishlar', 'Pichoq-vilka', 'Stakanlar'],
                    datasets: [{
                        data: [45, 30, 25],
                        backgroundColor: ['#0F172A', '#059669', '#D97706'],
                        borderWidth: 0
                    }]
                },
                options: commonOptions
            });
        }

        document.getElementById('search').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = inventory.filter(i => i.name.toLowerCase().includes(val));
            render(filtered);
        });

        window.onload = () => {
            render(inventory);
            initCharts();
        };
    </script>
</body>
</html>
