<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro 3D Real Drift City</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #05050a; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #00f0ff;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
            pointer-events: none;
            z-index: 10;
        }
        #ui h1 { margin: 0 0 5px 0; font-size: 20px; color: #00f0ff; text-transform: uppercase; }
        #telemetry {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: #39ff14;
            padding: 15px;
            border-radius: 50%;
            width: 80px;
            height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 3px solid #39ff14;
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.4);
            font-weight: bold;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui">
        <h1>Pro Drift Simulator</h1>
        <p style="margin: 5px 0;">Boshqarish: <b>W, A, S, D</b> / Yo'nalishlar</p>
        <p style="margin: 0; color: #ff3131;">Drift qilish uchun yuqori tezlikda keskin buriling!</p>
    </div>

    <div id="telemetry">
        <span id="speedo">0</span>
        <span style="font-size: 10px; color: #fff;">KM/H</span>
    </div>

    <script>
        // 1. SAHNA VA atmosfera
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0c14);
        scene.fog = new THREE.FogExp2(0x0a0c14, 0.008);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // 2. REALISTIK YORUG'LIK (Quyosh va Atrof-muhit)
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xffe1a8, 1.2);
        sunLight.position.set(50, 100, 50);
        sunLight.castShadow = true;
        scene.add(sunLight);

        // Shahar chiroqlari foni uchun tungi effekt neonlari
        const moonlight = new THREE.DirectionalLight(0x00f0ff, 0.4);
        moonlight.position.set(-50, 50, -50);
        scene.add(moonlight);

        // 3. HAQIQIY YO'LLAR VA KOPRIKLAR (ROAD SYSTEM)
        const roadGroup = new THREE.Group();
        
        // Markaziy Asfalt Yo'l
        const roadGeo = new THREE.PlaneGeometry(60, 1000);
        const roadMat = new THREE.MeshStandardMaterial({ color: 0x1a1a24, roughness: 0.9 });
        const mainRoad = new THREE.Mesh(roadGeo, roadMat);
        mainRoad.rotation.x = -Math.PI / 2;
        mainRoad.receiveShadow = true;
        roadGroup.add(mainRoad);

        // Yo'l chetidagi chiziqlar (Sariq va Oq)
        const lineGeo = new THREE.PlaneGeometry(0.5, 1000);
        const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
        const leftLine = new THREE.Mesh(lineGeo, lineMat);
        leftLine.position.set(-28, 0.02, 0);
        leftLine.rotation.x = -Math.PI / 2;
        roadGroup.add(leftLine);
        
        const rightLine = leftLine.clone();
        rightLine.position.x = 28;
        roadGroup.add(rightLine);

        // KOPRIK (BRIDGE) YARATISH
        const bridgeGroup = new THREE.Group();
        const bridgeFlyover = new THREE.Mesh(
            new THREE.BoxGeometry(30, 2, 200),
            new THREE.MeshStandardMaterial({ color: 0x2a2a35, roughness: 0.7 })
        );
        bridgeFlyover.position.set(0, 15, 150);
        bridgeGroup.add(bridgeFlyover);

        // Ko'prik ustunlari (Pillars)
        for(let p = -80; p <= 80; p += 40) {
            const pillar = new THREE.Mesh(
                new THREE.CylinderGeometry(2, 2, 15),
                new THREE.MeshStandardMaterial({ color: 0x3a3a45 })
            );
            pillar.position.set(0, 7.5, 150 + p);
            bridgeGroup.add(pillar);
        }
        scene.add(bridgeGroup);
        scene.add(roadGroup);

        // 4. HAQIQIY UYLAR (REALISTIC BUILDINGS)
        const buildings = [];
        const textureColors = [0x3a4050, 0x232733, 0x1b1e26, 0x4d566d];
        
        for (let i = 0; i < 80; i++) {
            const h = Math.random() * 80 + 30;
            const w = Math.random() * 20 + 15;
            const d = Math.random() * 20 + 15;
            
            const bGeo = new THREE.BoxGeometry(w, h, d);
            const bMat = new THREE.MeshStandardMaterial({ 
                color: textureColors[Math.floor(Math.random() * textureColors.length)],
                roughness: 0.6,
                metalness: 0.2
            });
            const building = new THREE.Mesh(bGeo, bMat);

            // Uy derazalari effekti (Glow)
            building.castShadow = true;
            building.receiveShadow = true;
            
            // Joylashtirish (Yo'ldan chetda)
            let x = (Math.random() - 0.5) * 600;
            let z = (Math.random() - 0.5) * 800;
            if (Math.abs(x) < 45) x += (x > 0 ? 50 : -50); // Yo'l ustiga tushmaslik

            building.position.set(x, h / 2, z);
            scene.add(building);
        }

        // 5. PROFESSIONAL MASHINA MODELI (DETAILED CAR)
        const carGroup = new THREE.Group();
        
        // Kuzov (Car Body)
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0xff3131, roughness: 0.2, metalness: 0.8 });
        const bodyGeo = new THREE.BoxGeometry(4, 1, 8);
        const carBody = new THREE.Mesh(bodyGeo, bodyMat);
        carBody.position.y = 0.8;
        carBody.castShadow = true;
        carGroup.add(carBody);

        // Tom qismi (Cabin)
        const cabinGeo = new THREE.BoxGeometry(3.6, 0.8, 4);
        const cabinMat = new THREE.MeshStandardMaterial({ color: 0x111115, roughness: 0.1 });
        const carCabin = new THREE.Mesh(cabinGeo, cabinMat);
        carCabin.position.set(0, 1.6, -0.5);
        carGroup.add(carCabin);

        // G'ildiraklar (Realistic Wheels)
        const wheelGeo = new THREE.CylinderGeometry(0.6, 0.6, 0.6, 24);
        const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 });
        const wheels = [];

        const wheelPositions = [
            { x: -2.1, y: 0.6, z: 2.3 },  // Old Chap
            { x: 2.1, y: 0.6, z: 2.3 },   // Old O'ng
            { x: -2.1, y: 0.6, z: -2.3 }, // Orqa Chap
            { x: 2.1, y: 0.6, z: -2.3 }   // Orqa O'ng
        ];

        wheelPositions.forEach((pos) => {
            const wMesh = new THREE.Mesh(wheelGeo, wheelMat);
            wMesh.rotation.z = Math.PI / 2;
            wMesh.position.set(pos.x, pos.y, pos.z);
            wMesh.castShadow = true;
            carGroup.add(wMesh);
            wheels.push(wMesh);
        });

        // Farlar (Headlights)
        const headlightGeo = new THREE.BoxGeometry(0.6, 0.2, 0.2);
        const headlightMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
        const fl = new THREE.Mesh(headlightGeo, headlightMat); fl.position.set(-1.5, 0.8, 4.01);
        const fr = fl.clone(); fr.position.x = 1.5;
        carGroup.add(fl, fr);

        scene.add(carGroup);

        // 6. DRIFT VA HARAKAT FIZIKASI (HACKER LEVEL DRIFT PHYSICS)
        let speed = 0;
        let maxSpeed = 3.5;
        let accel = 0.05;
        let friction = 0.02;
        let angle = 0;
        let steerAngle = 0;
        let driftFactor = 0.94; // Drift sirpanish koeffitsiyenti

        const keys = {};
        window.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);

        // Drift izlari (Skidmarks) yaratuvchi xizmat
        const skidGeometry = new THREE.BoxGeometry(0.4, 0.01, 0.4);
        const skidMaterial = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.6 });

        function leaveSkidMark() {
            const markLeft = new THREE.Mesh(skidGeometry, skidMaterial);
            markLeft.position.set(carGroup.position.x - 1.5, 0.02, carGroup.position.z);
            const markRight = markLeft.clone();
            markRight.position.x = carGroup.position.x + 1.5;
            scene.add(markLeft, markRight);
            
            // 4 soniyadan keyin o'chirish (Xotirani tejash uchun)
            setTimeout(() => { scene.remove(markLeft); scene.remove(markRight); }, 4000);
        }

        function updatePhysics() {
            // Oldinga va Orqaga gaz berish
            if (keys['w'] || keys['arrowup']) {
                if (speed < maxSpeed) speed += accel;
            } else if (keys['s'] || keys['arrowdown']) {
                if (speed > -maxSpeed/2) speed -= accel;
            } else {
                if (speed > 0) speed -= friction;
                if (speed < 0) speed += friction;
                if (Math.abs(speed) < friction) speed = 0;
            }

            // Burilish boshqaruvi va g'ildiraklar animatsiyasi
            if (keys['a'] || keys['arrowleft']) {
                steerAngle = 0.04;
                wheels[0].rotation.x += 0.1; // G'ildirak aylanishi
                wheels[1].rotation.x += 0.1;
            } else if (keys['d'] || keys['arrowright']) {
                steerAngle = -0.04;
            } else {
                steerAngle = 0;
            }

            // Real Drift Algoritmi (Keskin burilganda mashina yonboshlab sirpanadi)
            if (Math.abs(speed) > 1.5 && steerAngle !== 0) {
                angle += steerAngle * (speed / maxSpeed) * driftFactor;
                carGroup.rotation.y = angle + (steerAngle * 0.4); // Kuzov burilishi
                leaveSkidMark(); // Iz qoldirish
            } else {
                angle += steerAngle * (speed / maxSpeed);
                carGroup.rotation.y = angle;
            }

            // Pozitsiyani fizik hisoblash
            carGroup.position.x += Math.sin(angle) * speed;
            carGroup.position.z += Math.cos(angle) * speed;

            // G'ildiraklarni vizual aylantirish
            wheels.forEach(w => w.rotation.x += speed * 0.2);

            // Spidometrni yangilash
            document.getElementById('speedo').innerText = Math.round(Math.abs(speed) * 60);
        }

        // 7. CINEMATIC CAMERA SYSTEM
        function updateCamera() {
            // Kamera silliq ravishda mashina orqasidan kuzatadi (Lerp effekti)
            const targetOffset = new THREE.Vector3(
                carGroup.position.x - Math.sin(angle) * 18,
                carGroup.position.y + 7,
                carGroup.position.z - Math.cos(angle) * 18
            );
            camera.position.lerp(targetOffset, 0.1);
            camera.lookAt(carGroup.position.clone().add(new THREE.Vector3(0, 1, 0)));
        }

        // 8. ANIMATION LOOP
        function animate() {
            requestAnimationFrame(animate);
            updatePhysics();
            updateCamera();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
