<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ottimo Inventar Katalogi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #FDFCF0; }
        .item-card:hover img { transform: scale(1.05); transition: transform 0.3s ease; }
    </style>
</head>
<body class="text-slate-900 pb-20">

    <header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200 py-6 px-6">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-2xl font-bold text-[#4A5D23]">OTTIMO <span class="font-light text-slate-500">KATALOG</span></h1>
            <div id="filter-nav" class="flex flex-wrap gap-2 justify-center">
                <button onclick="filterItems('all')" class="px-4 py-2 bg-[#4A5D23] text-white rounded-lg text-sm font-medium">Barchasi</button>
                <button onclick="filterItems('Qoshiqlar')" class="px-4 py-2 hover:bg-slate-100 rounded-lg text-sm font-medium">Qoshiqlar</button>
                <button onclick="filterItems('Vilkalar')" class="px-4 py-2 hover:bg-slate-100 rounded-lg text-sm font-medium">Vilkalar</button>
                <button onclick="filterItems('Tarelkalar')" class="px-4 py-2 hover:bg-slate-100 rounded-lg text-sm font-medium">Tarelkalar</button>
                <button onclick="filterItems('Stakanlar')" class="px-4 py-2 hover:bg-slate-100 rounded-lg text-sm font-medium">Stakanlar</button>
                <button onclick="filterItems('Chashkalar')" class="px-4 py-2 hover:bg-slate-100 rounded-lg text-sm font-medium">Chashkalar</button>
                <button onclick="filterItems('Kofe anjomlari')" class="px-4 py-2 hover:bg-slate-100 rounded-lg text-sm font-medium">Kofe anjomlari</button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-10">
        <div id="gallery-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8">
            <!-- Items populated by JS -->
        </div>
    </main>

    <script>
        const inventoryItems = [
            { id: 1, name: "Bar qoshiq (fork end)", file: "photo_1_2026-06-12_14-22-18_2.jpg", category: "Qoshiqlar" },
            { id: 2, name: "Saucer (Tarelka)", file: "photo_2_2026-06-12_14-22-18_2.jpg", category: "Tarelkalar" },
            { id: 3, name: "Pichoq", file: "photo_3_2026-06-12_14-22-18_2.jpg", category: "Pichoqlar" },
            { id: 4, name: "Katta vilka", file: "photo_4_2026-06-12_14-22-18_2.jpg", category: "Vilkalar" },
            { id: 5, name: "Kichik vilka", file: "photo_5_2026-06-12_14-22-18_2.jpg", category: "Vilkalar" },
            { id: 6, name: "Ahmad Tea qoshiq", file: "photo_6_2026-06-12_14-22-18_2.jpg", category: "Qoshiqlar" },
            { id: 7, name: "Choy qoshiq", file: "photo_7_2026-06-12_14-22-18_2.jpg", category: "Qoshiqlar" },
            { id: 8, name: "Kvadrat tarelka", file: "photo_8_2026-06-12_14-22-18_2.jpg", category: "Tarelkalar" },
            { id: 9, name: "Stakan", file: "photo_9_2026-06-12_14-22-18_2.jpg", category: "Stakanlar" },
            { id: 10, name: "Stakan", file: "photo_10_2026-06-12_14-22-18.jpg", category: "Stakanlar" },
            { id: 11, name: "Irish Coffee Stakan", file: "photo_11_2026-06-12_14-22-18.jpg", category: "Stakanlar" },
            { id: 12, name: "Pitcher 0.6L", file: "photo_12_2026-06-12_14-22-18.jpg", category: "Kofe anjomlari" },
            { id: 13, name: "Pitcher 0.35L", file: "photo_13_2026-06-12_14-22-18.jpg", category: "Kofe anjomlari" },
            { id: 14, name: "Pitcher 0.15L", file: "photo_14_2026-06-12_14-22-18.jpg", category: "Kofe anjomlari" },
            { id: 15, name: "Oq Chashka (Katta)", file: "photo_15_2026-06-12_14-22-18.jpg", category: "Chashkalar" },
            { id: 16, name: "Oq Chashka (O'rta)", file: "photo_16_2026-06-12_14-22-18.jpg", category: "Chashkalar" },
            { id: 17, name: "Oq Chashka (Kichik)", file: "photo_17_2026-06-12_14-22-18.jpg", category: "Chashkalar" },
            { id: 18, name: "Oq Chashka", file: "photo_18_2026-06-12_14-22-18.jpg", category: "Chashkalar" },
            { id: 19, name: "Saucer (Kichik)", file: "photo_19_2026-06-12_14-22-18.jpg", category: "Tarelkalar" },
            { id: 20, name: "Saucer (Katta)", file: "photo_20_2026-06-12_14-22-18.jpg", category: "Tarelkalar" }
        ];

        function renderItems(items) {
            const grid = document.getElementById('gallery-grid');
            grid.innerHTML = items.map(item => `
                <div class="item-card bg-white p-4 rounded-2xl shadow-sm border border-slate-100 transition-all hover:shadow-md">
                    <div class="aspect-square bg-slate-50 rounded-xl mb-4 overflow-hidden flex items-center justify-center">
                        <img src="${item.file}" alt="${item.name}" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/400x400/e2e8f0/64748b?text=Rasm+topilmadi'">
                    </div>
                    <h3 class="font-semibold text-slate-800">${item.name}</h3>
                    <p class="text-xs text-slate-400 mt-1 uppercase tracking-wider">${item.category}</p>
                </div>
            `).join('');
        }

        function filterItems(category) {
            if (category === 'all') {
                renderItems(inventoryItems);
            } else {
                const filtered = inventoryItems.filter(i => i.category === category);
                renderItems(filtered);
            }
        }

        // Initial render
        renderItems(inventoryItems);
    </script>
</body>
</html>
