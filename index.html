<div class="container">
    <h2 style="text-align: center; color: var(--neon-blue); margin-bottom: 10px;">Neon Drift Arena</h2>
    <p style="text-align: center; color: var(--text-muted); margin-bottom: 15px;">
        Boshqarish: <b style="color: var(--neon-green);">W, A, S, D</b> yoki <b style="color: var(--neon-green);">Yo'nalish tugmalari</b>. Drift qilish uchun tezlikda keskin buriling!
    </p>
    <canvas id="driftCanvas" width="800" height="500" style="border: 2px solid var(--neon-blue); box-shadow: 0 0 20px var(--neon-blue); display: block; margin: 0 auto; background: #0c1020;"></canvas>
</div>

<script>
const canvas = document.getElementById("driftCanvas");
const ctx = canvas.getContext("2d");

// Klaviatura tugmalarini eslab qolish
const keys = {};
window.addEventListener("keydown", e => keys[e.key] = true);
window.addEventListener("keyup", e => keys[e.key] = false);

// Mashina obyekti va fizikasi
const car = {
    x: canvas.width / 2,
    y: canvas.height / 2,
    width: 30,
    height: 15,
    angle: 0,
    speed: 0,
    maxSpeed: 6,
    acc: 0.15,
    friction: 0.05,
    steerSpeed: 0.04,
    driftFriction: 0.96 // Drift hissini beruvchi asosiy ko'rsatkich
};

// Drift izlarini saqlash uchun massiv
const skidMarks = [];

function updatePhysics() {
    // Oldinga va orqaga yurish
    if (keys["w"] || keys["ArrowUp"]) {
        if (car.speed < car.maxSpeed) car.speed += car.acc;
    } else if (keys["s"] || keys["ArrowDown"]) {
        if (car.speed > -car.maxSpeed / 2) car.speed -= car.acc;
    } else {
        // Inersiya hisobiga to'xtash
        if (car.speed > 0) car.speed -= car.friction;
        if (car.speed < 0) car.speed += car.friction;
        if (Math.abs(car.speed) < 0.05) car.speed = 0;
    }

    // O'ngga va chapga burilish (faqat mashina harakatlanayotganda)
    if (Math.abs(car.speed) > 0.2) {
        const currentSteer = car.speed > 0 ? car.steerSpeed : -car.steerSpeed;
        if (keys["a"] || keys["ArrowLeft"]) car.angle -= currentSteer;
        if (keys["d"] || keys["ArrowRight"]) car.angle += currentSteer;
    }

    // Drift fizikasi (Harakat yo'nalishi va mashina burchagi o'rtasidagi farq)
    // Agar keskin burilsa, drift izi qoladi
    if (Math.abs(car.speed) > 3 && (keys["a"] || keys["ArrowLeft"] || keys["d"] || keys["ArrowRight"])) {
        skidMarks.push({ x: car.x, y: car.y });
        if (skidMarks.length > 150) skidMarks.shift(); // Xotirani to'ldirmaslik uchun eskilarini o'chiramiz
    }

    // Pozitsiyani yangilash
    car.x += Math.cos(car.angle) * car.speed;
    car.y += Math.sin(car.angle) * car.speed;

    // Devorlardan o'tib ketmaslik (Ekran chegaralari)
    if (car.x < 0) car.x = canvas.width;
    if (car.x > canvas.width) car.x = 0;
    if (car.y < 0) car.y = canvas.height;
    if (car.y > canvas.height) car.y = 0;
}

function drawSkidMarks() {
    if (skidMarks.length < 2) return;
    ctx.beginPath();
    ctx.strokeStyle = "rgba(255, 49, 49, 0.4)"; // Neon qizil rangdagi drift izlari
    ctx.lineWidth = 3;
    ctx.shadowBlur = 5;
    ctx.shadowColor = "var(--neon-red)";
    
    for (let i = 0; i < skidMarks.length; i++) {
        ctx.lineTo(skidMarks[i].x, skidMarks[i].y);
    }
    ctx.stroke();
    ctx.shadowBlur = 0; // Boshqa elementlarga ta'sir qilmasligi uchun o'chiramiz
}

function drawCar() {
    ctx.save();
    ctx.translate(car.x, car.y);
    ctx.rotate(car.angle);

    // Mashina korpusi (Neon yashil)
    ctx.fillStyle = "#141b2d";
    ctx.strokeStyle = "var(--neon-green)";
    ctx.lineWidth = 2;
    ctx.shadowBlur = 15;
    ctx.shadowColor = "var(--neon-green)";
    
    ctx.fillRect(-car.width / 2, -car.height / 2, car.width, car.height);
    ctx.strokeRect(-car.width / 2, -car.height / 2, car.width, car.height);

    // Neon ko'k chiroqlar (Mashina old qismi qayerdaligini bilish uchun)
    ctx.fillStyle = "var(--neon-blue)";
    ctx.shadowColor = "var(--neon-blue)";
    ctx.fillRect(car.width / 2 - 4, -car.height / 2 + 2, 4, 3);
    ctx.fillRect(car.width / 2 - 4, car.height / 2 - 5, 4, 3);

    ctx.restore();
}

function gameLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Grid (Orqa fon chiziqlari) - Arena ko'rinishini berish uchun
    ctx.strokeStyle = "rgba(0, 240, 255, 0.05)";
    ctx.lineWidth = 1;
    for (let i = 0; i < canvas.width; i += 40) {
        ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
    }
    for (let j = 0; j < canvas.height; j += 40) {
        ctx.beginPath(); ctx.moveTo(0, j); ctx.lineTo(canvas.width, j); ctx.stroke();
    }

    drawSkidMarks();
    updatePhysics();
    drawCar();

    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
