<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ottimo Inventar Katalogi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #FDFCF0; }
        .item-card:hover img { transform: scale(1.05); transition: transform 0.3s ease; }
    </style>
</head>
<body class="text-slate-900 pb-20">

    <header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200 py-6 px-6">
        <div class="max-w-6xl mx-auto flex flex-col gap-6">
            <h1 class="text-2xl font-bold text-[#4A5D23] text-center md:text-left">OTTIMO <span class="font-light text-slate-500">INVENTAR</span></h1>
            
            <div id="branch-nav" class="flex flex-wrap gap-2 justify-center md:justify-start border-b border-slate-100 pb-4">
                <span class="text-sm font-bold text-slate-400 self-center mr-2 uppercase">Filial:</span>
                <button onclick="applyFilters('branch', 'all')" class="px-4 py-2 bg-[#4A5D23] text-white rounded-lg text-sm font-medium">Barchasi</button>
                <button onclick="applyFilters('branch', 'Parus')" class="px-4 py-2 bg-slate-100 hover:bg-slate-200 rounded-lg text-sm font-medium">Parus</button>
                <button onclick="applyFilters('branch', 'Nukus')" class="px-4 py-2 bg-slate-100 hover:bg-slate-200 rounded-lg text-sm font-medium">Nukus</button>
            </div>

            <div id="category-nav" class="flex flex-wrap gap-2 justify-center md:justify-start">
                <span class="text-sm font-bold text-slate-400 self-center mr-2 uppercase">Turkum:</span>
                <button onclick="applyFilters('category', 'all')" class="px-4 py-2 bg-slate-200 rounded-lg text-sm font-medium">Barchasi</button>
                <button onclick="applyFilters('category', 'Qoshiqlar')" class="px-4 py-2 hover:bg-slate-100 rounded-lg text-sm font-medium">Qoshiqlar</button>
                <button onclick="applyFilters('category', 'Vilkalar')" class="px-4 py-2 hover:bg-slate-100 rounded-lg text-sm font-medium">Vilkalar</button>
                <button onclick="applyFilters('category', 'Tarelkalar')" class="px-4 py-2 hover:bg-slate-100 rounded-lg text-sm font-medium">Tarelkalar</button>
                <button onclick="applyFilters('category', 'Stakanlar')" class="px-4 py-2 hover:bg-slate-100 rounded-lg text-sm font-medium">Stakanlar</button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-10">
        <div id="gallery-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8">
            <!-- Items populated by JS -->
        </div>
    </main>

    <script>
        // Placeholder Base64 SVG (Siz buni o'zingizning rasmingiz kodi bilan almashtirasiz)
        const placeholderImg = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23cbd5e1'%3E%3Cpath d='M21 3H3c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM5 17l3.5-4.5 2.5 3.01L14.5 11l4.5 6H5z'/%3E%3C/svg%3E";

        const inventoryItems = [
            { name: "Bar qoshiq", img: placeholderImg, category: "Qoshiqlar", branches: ["Parus"] },
            { name: "Saucer (Tarelka)", img: placeholderImg, category: "Tarelkalar", branches: ["Parus", "Nukus"] },
            { name: "Katta vilka", img: placeholderImg, category: "Vilkalar", branches: ["Parus", "Nukus"] },
            { name: "Latte stakan", img: placeholderImg, category: "Stakanlar", branches: ["Parus"] }
        ];

        let currentBranch = 'all';
        let currentCategory = 'all';

        function renderItems(items) {
            const grid = document.getElementById('gallery-grid');
            grid.innerHTML = items.map(item => `
                <div class="item-card bg-white p-4 rounded-2xl shadow-sm border border-slate-100 transition-all hover:shadow-md">
                    <div class="aspect-square bg-slate-50 rounded-xl mb-4 overflow-hidden flex items-center justify-center p-4">
                        <img src="${item.img}" alt="${item.name}" class="w-full h-full object-contain">
                    </div>
                    <h3 class="font-semibold text-slate-800">${item.name}</h3>
                    <div class="flex flex-wrap gap-2 mt-2">
                        <span class="text-[10px] bg-slate-100 px-2 py-0.5 rounded uppercase font-bold text-slate-500">${item.category}</span>
                    </div>
                </div>
            `).join('');
        }

        function applyFilters(type, value) {
            if (type === 'branch') currentBranch = value;
            if (type === 'category') currentCategory = value;

            const filtered = inventoryItems.filter(item => {
                const matchesBranch = currentBranch === 'all' || item.branches.includes(currentBranch);
                const matchesCategory = currentCategory === 'all' || item.category === currentCategory;
                return matchesBranch && matchesCategory;
            });

            renderItems(filtered);
        }

        renderItems(inventoryItems);
    </script>
</body>
</html>
